rules:
  # ═══════════════════════════════════════════════════════════════════
  # IHF — Mundiales (hombres / mujeres / sub-)
  # ═══════════════════════════════════════════════════════════════════
  - section: ihf/world-men
    tags: [ihf-world-men, world-championship-men, mundial-masculino]
    keywords: [ihf world championship men, world championship men, mundial masculino,
               campeonato del mundo masculino, "world men's handball championship",
               "sub-21 masculino mundial", "u21 world championship men",
               "u19 world championship men", "u17 world championship men",
               "sub-19 masculino mundial", "sub-17 masculino mundial"]
    exclude: [femenin, women, mujer]

  - section: ihf/world-women
    tags: [ihf-world-women, world-championship-women, mundial-femenino]
    keywords: [ihf world championship women, world championship women, mundial femenino,
               campeonato del mundo femenino, "world women's handball championship",
               "u21 world championship women", "u19 world championship women",
               "u17 world championship women",
               "sub-21 femenino mundial", "sub-19 femenino mundial"]
    exclude: [masculin, men's, hombre]

  # ═══════════════════════════════════════════════════════════════════
  # EHF EURO — Eurocopas nacionales (hombres / mujeres / sub-)
  # ═══════════════════════════════════════════════════════════════════
  - section: europe/euro-men
    tags: [ehf-euro-men, european-championship-men, eurocopa-masculina]
    keywords: ["ehf euro men", "european championship men", eurocopa masculina,
               "campeonato europeo masculino", "european handball championship men",
               "men's ehf euro", "men ehf euro",
               "u21 european championship men", "u19 european championship men",
               "u17 european championship men", "m20 european championship",
               "sub-21 europeo masculino", "sub-19 europeo masculino",
               "sub-17 europeo masculino"]
    exclude: [women, femenin, mujer]

  - section: europe/euro-women
    tags: [ehf-euro-women, european-championship-women, eurocopa-femenina]
    keywords: ["ehf euro women", "european championship women", eurocopa femenina,
               "campeonato europeo femenino", "european handball championship women",
               "women's ehf euro", "women ehf euro",
               "u21 european championship women", "u19 european championship women",
               "u17 european championship women", "w20 european championship",
               "sub-21 europeo femenino", "sub-19 europeo femenino"]
    exclude: [men's, masculin, hombre]

  # ═══════════════════════════════════════════════════════════════════
  # EHF Champions League
  # ═══════════════════════════════════════════════════════════════════
  - section: europe/champions-women
    tags: [ehf-champions-league-women, champions-league-women]
    keywords: ["ehf champions league women", "champions league women", "champions league femenina",
               "champions league fem", "final four femenina", "ehf cl women",
               "women's champions league", "liga de campeones femenina"]

  - section: europe/champions
    tags: [ehf-champions-league, champions-league-handball, ehf-cl]
    keywords: ["ehf champions league", "champions league ehf", "champions league handball",
               "liga de campeones ehf", "champions league de balonmano",
               "final four ehf", "final4 ehf", "final four champions"]
    exclude: [women, femenin]

  # ═══════════════════════════════════════════════════════════════════
  # EHF European League
  # ═══════════════════════════════════════════════════════════════════
  - section: europe/european-league-women
    tags: [ehf-european-league-women, european-league-women]
    keywords: ["ehf european league women", "european league women", "european league femenina",
               "european league fem"]

  - section: europe/european-league
    tags: [ehf-european-league, european-league-handball]
    keywords: ["ehf european league", "european league ehf", "european league handball",
               "copa ehf", "copa de la ehf"]
    exclude: [women, femenin]

  # ═══════════════════════════════════════════════════════════════════
  # EHF European Cup (antigua EHF Cup / Challenge Cup)
  # ═══════════════════════════════════════════════════════════════════
  - section: europe/cup-women
    tags: [ehf-cup-women, european-cup-women]
    keywords: ["ehf european cup women", "european cup women", "copa europea femenina",
               "ehf cup women", "challenge cup women"]

  - section: europe/cup-men
    tags: [ehf-cup-men, european-cup-men]
    keywords: ["ehf european cup", "european cup handball", "copa europea balonmano",
               "ehf cup handball", "challenge cup handball"]
    exclude: [women, femenin, champions league, european league]

  # ═══════════════════════════════════════════════════════════════════
  # Otras EHF (catch-all EHF)
  # ═══════════════════════════════════════════════════════════════════
  - section: europe/other
    tags: [ehf, eurohandball]
    keywords: [eurohandball, "ehf beach handball", "beach handball", "handbol platja"]
    exclude: [champions league, european league, european cup, copa europea, ehf cup,
              euro men, euro women, world championship]

  # ═══════════════════════════════════════════════════════════════════
  # Selección Nacional España
  # ═══════════════════════════════════════════════════════════════════
  - section: spain/seleccion-masc
    tags: [seleccion-espanola-masculina, seleccion-masculina]
    keywords: [selección masculina, seleccion masculina, selección española masculina,
               "los hispanos", "selección nacional masculin", "seleccion nacional masculin",
               "equipo nacional masculin"]
    exclude: [femenina, juvenil, cadete, infantil, sub-18, sub-20, sub-21,
              "primera nacional", "division honor", "división honor"]

  - section: spain/seleccion-fem
    tags: [seleccion-espanola-femenina, seleccion-femenina]
    keywords: [selección femenina, seleccion femenina, selección española femenina,
               "las guerreras", seleccionadora, "selección nacional femenin",
               "seleccion nacional femenin", "equipo nacional femenin"]
    exclude: [masculina, juvenil, cadete, infantil, sub-18, sub-20, sub-21,
              liga guerreras iberdrola, asobal, "primera nacional", "division honor",
              "división honor"]

  # ═══════════════════════════════════════════════════════════════════
  # Categorías Base España
  # ═══════════════════════════════════════════════════════════════════
  - section: spain/base-masc
    tags: [base-masculino, juvenil-masculino, cadete-masculino, infantil-masculino]
    keywords: [juvenil masculino, cadete masculino, infantil masculino, alevín masculino,
               benjamín masculino, campeonato de españa cadete, campeonato de españa juvenil,
               campeonato de españa infantil, campeonato de españa alevín,
               "sub-20 masculino", "sub-18 masculino", "sub-16 masculino",
               categorías base masculino]
    require_any: [juvenil, cadete, infantil, "alevín", "alevin", benjamín, benjamin,
                  sub-20, sub-18, sub-16, sub-14, campeonato de españa base]
    exclude: [femenin, selección española, seleccion española]

  - section: spain/base-fem
    tags: [base-femenino, juvenil-femenino, cadete-femenino, infantil-femenino]
    keywords: [juvenil femenino, cadete femenino, infantil femenino, alevín femenino,
               benjamín femenino, campeonato de españa cadete femenino,
               campeonato de españa juvenil femenino,
               "sub-20 femenino", "sub-18 femenino", "sub-16 femenino",
               categorías base femenino]
    require_any: [juvenil, cadete, infantil, "alevín", "alevin", benjamín, benjamin,
                  sub-20, sub-18, sub-16, sub-14]
    exclude: [masculin, selección española, seleccion española]

  # ═══════════════════════════════════════════════════════════════════
  # Liga ASOBAL y otras ligas masculinas España
  # ═══════════════════════════════════════════════════════════════════
  - section: spain/asobal
    tags: [asobal, liga-asobal]
    keywords: [asobal, "liga asobal", "liga sacyr asobal", "liga sacyr",
               "división de honor masculina", "division de honor masculina"]
    exclude: [femenin, juvenil, cadete, infantil, alevín, benjamín, base]

  - section: spain/dhp
    tags: [dhp, division-honor-plata-masc]
    keywords: ["división honor plata masculino", "division honor plata masculino",
               "división de honor plata", "division de honor plata",
               "dhp masculino", dhp]
    exclude: [femenin]

  - section: spain/primera-nacional-masc
    tags: [primera-nacional]
    keywords: ["primera nacional masculin", "primera nacional", "1ª nacional", "1a nacional"]
    exclude: [femenin]

  # ═══════════════════════════════════════════════════════════════════
  # Liga femenina España
  # ═══════════════════════════════════════════════════════════════════
  - section: spain/guerreras
    tags: [liga-guerreras, guerreras-iberdrola, liga-femenina-asobal]
    keywords: ["liga guerreras", "guerreras iberdrola", "liga femenina balonmano",
               "liga primera división femenina", liga guerreras]
    exclude: [masculin, sub-20, sub-18, juvenil, cadete]

  - section: spain/dho-fem
    tags: [dho-femenino, division-honor-oro-femenino]
    keywords: ["división honor oro femenino", "dho femenino",
               "primera división femenina"]
