  - section: spain/dhp-fem
    tags: [dhp-femenino, division-honor-plata-femenino]
    keywords: ["división honor plata femenino", "dhp femenino",
               "segunda división femenina", "división honor plata fem",
               "division honor plata fem"]
    exclude: [masculin]

