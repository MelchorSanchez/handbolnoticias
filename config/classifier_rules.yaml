rules:
  # ── Selección Nacional ──────────────────────────────────────────────
  - section: spain/seleccion-masc
    tags: [seleccion-espanola-masculina, seleccion masculina, spain men]
    keywords: [selección masculina, seleccion masculina, selección española masculina,
               "los hispanos", goles del rey, nacional masculin]
    exclude: [femenina, juvenil, cadete, infantil, alevín, benjamín, sub-18, sub-20, sub-21]

  - section: spain/seleccion-fem
    tags: [seleccion-espanola-femenina, seleccion femenina, spain women]
    keywords: [selección femenina, seleccion femenina, selección española femenina,
               "las guerreras", seleccionadora, nacional femenin]
    exclude: [masculina, juvenil, cadete, infantil, alevín, benjamín, sub-18, sub-20, sub-21, liga guerreras iberdrola, asobal]

  # ── Categorías Base ─────────────────────────────────────────────────
  - section: spain/base-masc
    tags: [base-masculino, juvenil-masculino, cadete-masculino, infantil-masculino,
           alevín-masculino, benjamín-masculino]
    keywords: [juvenil masculino, cadete masculino, infantil masculino, alevín masculino,
               benjamín masculino, "sub-20 masculino", "sub-18 masculino", "sub-16 masculino",
               "sub-14 masculino", categorías base masculino, base masc]
    require_any: [juvenil, cadete, infantil, alevín, alevín, benjamín, sub-20, sub-18, sub-16, sub-14]
    exclude: [femenin, selección española]

  - section: spain/base-fem
    tags: [base-femenino, juvenil-femenino, cadete-femenino, infantil-femenino,
           alevín-femenino, benjamín-femenino]
    keywords: [juvenil femenino, cadete femenino, infantil femenino, alevín femenino,
               benjamín femenino, "sub-20 femenino", "sub-18 femenino", "sub-16 femenino",
               "sub-14 femenino", categorías base femenino, base fem]
    require_any: [juvenil, cadete, infantil, alevín, alevín, benjamín, sub-20, sub-18, sub-16, sub-14]
    exclude: [masculin, selección española]

  # ── Liga Asobal ─────────────────────────────────────────────────────
  - section: spain/asobal
    tags: [asobal, balonmano asobal, liga asobal]
    keywords: [asobal, "liga asobal", "liga sacyr asobal", "liga sacyr",
               "división de honor", "division de honor masculina",
               portland san antonio, bidasoa, ademar, granollers, fraikin,
               cuenca, helvetia anaitasuna, bathco, deza, torrelavega, abanca]
    exclude: [femenin, dho-fem, guerreras, plata, segunda]

  - section: spain/dhp
    tags: [dhp, division-honor-plata, primera-nacional-masc]
    keywords: ["división honor plata", "division honor plata", "dhp masculino",
               "primera nacional masculina", "primera nacional masc"]
    exclude: [femenin]

  - section: spain/primera-nacional-masc
    tags: [primera-nacional]
    keywords: ["primera nacional"]
    exclude: [femenin]

  # ── Liga Femenina ────────────────────────────────────────────────────
  - section: spain/guerreras
    tags: [liga-guerreras, guerreras-iberdrola, liga-femenina-asobal]
    keywords: ["liga guerreras", "guerreras iberdrola", "liga femenina",
               "balonmano femenino", bm elda, bm le6n, bm lanzarote,
               "super amara bera bera", "rincón dinamita", "itxako"]
    exclude: [masculin, sub-20, sub-18, dhp, segunda]

  - section: spain/dho-fem
    tags: [dho-femenino, division-honor-oro-femenino]
    keywords: ["división honor oro femenino", "division honor oro femenino",
               "dho femenino", "primera divisón femenina"]
    exclude: [masculin]

  - section: spain/dhp-fem
    tags: [dhp-femenino, division-honor-plata-femenino]
    keywords: ["división honor plata femenino", "division honor plata femenino",
               "dhp femenino", "segunda división femenina"]
    exclude: [masculin]

  # ── Territorial España ───────────────────────────────────────────────
  - section: spain/catalonia
    tags: [cataluña, catalonia, rfeb-cat, cathandbol]
    keywords: [cathandbol, "handbol català", "rfeb cataluña", "handball catalunya",
               "balonmano cataluña", "handbol catalonia"]

  - section: spain/navarra
    tags: [navarra, rfeb-navarra]
    keywords: ["balonmano navarra", "handball navarra", "navarra balonmano",
               "rfeb navarra", "federación navarra"]

  - section: spain/euskadi
    tags: [euskadi, pais-vasco, rfeb-euskadi]
    keywords: [eskubaloia, "balonmano euskadi", "handball euskadi",
               "handball vasco", "federación vasca", "rfeb euskadi"]

  # ── Europa EHF ──────────────────────────────────────────────────────
