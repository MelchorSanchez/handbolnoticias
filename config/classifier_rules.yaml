rules:
  # ═══════════════════════════════════════════════════════════════════
  # IHF — Mundiales (hombres / mujeres / sub-)
  # Sinónimos: World Championship / World Cup / Mundial / Copa del Mundo
  # ═══════════════════════════════════════════════════════════════════
  - section: ihf/world-men
    tags: [ihf-world-men, world-championship-men, mundial-masculino]
    keywords:
      # Inglés — género explícito
      - "world championship men"
      - "men's world championship"
      - "men's world handball"
      - "world men's handball championship"
      - "men handball world championship"
      # Inglés — IHF genérico (sin género; cubre "2027 World Championship", wild cards, etc.)
      - "ihf world championship"
      - "world handball championship"
      - "handball world championship"
      - "ihf wild card"
      - "world cup handball"
      - "handball world cup"
      - "ihf championship"
      - "ihf 2025"
      - "ihf 2026"
      - "ihf 2027"
      - "ihf 2028"
      # Español
      - "mundial masculino"
      - "campeonato del mundo masculino"
      - "copa del mundo balonmano"
      - "mundial de balonmano"
      - "campeonato mundial de balonmano"
      - "copa mundial de balonmano"
      - "mundial balonmano"
      - "mundial 2027"
      - "mundial 2028"
      - "mundialista"
      - "clasificación mundial balonmano"
      - "clasificacion mundial balonmano"
      - "play-off mundial balonmano"
      - "playoff mundial balonmano"
      - "clasificatorio mundial"
      # Inglés — WCh play-offs 2027
      - "world championship 2027"
      - "wch 2027"
      - "ihf men's world championship"
      - "world championship play-off"
      - "wch play-off"
      # Sub-categorías
      - "u21 world championship men"
      - "u19 world championship men"
      - "u17 world championship men"
      - "sub-21 masculino mundial"
      - "sub-19 masculino mundial"
      - "sub-17 masculino mundial"
    exclude: [femenin, women, mujer, "world championship women", "champions league", "european league"]

  - section: ihf/world-women
    tags: [ihf-world-women, world-championship-women, mundial-femenino]
    keywords:
      # Inglés — género explícito
      - "world championship women"
      - "women's world championship"
      - "women's world handball"
      - "world women's handball championship"
      - "women handball world championship"
      # Español
      - "mundial femenino"
      - "campeonato del mundo femenino"
      - "copa del mundo balonmano femenino"
      - "mundial de balonmano femenino"
      - "mundial balonmano femenino"
      # Sub-categorías
      - "u21 world championship women"
      - "u19 world championship women"
      - "u17 world championship women"
      - "sub-21 femenino mundial"
      - "sub-19 femenino mundial"
    exclude: [masculin, "men's", hombre, "world championship men", "champions league", "european league"]

