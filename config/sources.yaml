  # ══════════════════════════════════════════════════════════════════════════
  # ESPAÑA — Balonmano especializado
  # ══════════════════════════════════════════════════════════════════════════
  - name: RFEBM
    section: spain/asobal
    type: rss
    url: https://www.rfebm.com/feed/
    max_items: 50

  - name: Marca-Balonmano
    section: spain/asobal
    type: scrape
    url: https://www.marca.com/balonmano.html
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

  - name: MundoDeportivo-Balonmano
    section: spain/asobal
    type: scrape
    url: https://www.mundodeportivo.com/balonmano
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

