    type: rss
    url: https://www.rfebm.com/feed/
    max_items: 50

  - name: Marca-Balonmano
    section: spain
    type: scrape
    url: https://www.marca.com/balonmano.html
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
