    type: rss
    url: https://www.cathandbol.cat/feed/
    max_items: 30

  # ── España — Prensa deportiva nacional ────────────────────────────────────
  - name: Marca-Balonmano
    section: spain/asobal
    type: scrape
    url: https://www.marca.com/balonmano.html
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

  - name: AS-Balonmano
    section: spain/asobal
    type: scrape
    url: https://as.com/balonmano/
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

  - name: MundoDeportivo-Balonmano
    section: spain/asobal
    type: scrape
    url: https://www.mundodeportivo.com/balonmano
    max_items: 20
    selectors:
      articles: "article"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

  # ── Europa ────────────────────────────────────────────────────────────────
  - name: EHF
    section: europe/champions
    type: scrape
    url: https://www.eurohandball.com/en/news/
    max_items: 30
    selectors:
      articles: "article, .news-item"
      title: "h2, h3, .title"
      link: "a[href]"
      image: "img"

  # ── Internacional — Francia ───────────────────────────────────────────────
  - name: LNH-Starligue
    section: france
    type: scrape
    url: https://www.lnh.fr/fr/actualites
    max_items: 20
    selectors:
      articles: "article, .news-card"
      title: "h2, h3"
      link: "a[href]"
      image: "img"

